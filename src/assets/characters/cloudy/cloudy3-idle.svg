<g class="cloudy3-eye"><circle cx="44.8034" cy="44.8034" r="44.8034" transform="matrix(-1 0 0 1 347.542 132.807)" fill="white"/><g class="cloudy3-pupil"><circle cx="26.9839" cy="26.9839" r="26.9839" transform="matrix(-1 0 0 1 330.213 150.377)" fill="black"/></g></g>
