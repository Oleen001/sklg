<svg width="668" height="510" viewBox="0 0 668 510" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="cloudy3-title">
<title id="cloudy3-title">Cloudy 3 idle mascot</title>
<style>
  #cloudy3 { transform-box: view-box; transform-origin: 50% 55%; animation: c3-float 5.2s ease-in-out infinite; }
  #cloudy3-body { transform-box: fill-box; transform-origin: 50% 78%; animation: c3-puff 4.6s ease-in-out infinite; }
  #cloudy3-face { transform-box: fill-box; transform-origin: 50% 50%; animation: c3-face 5.2s ease-in-out infinite; }
  .cloudy3-eye { transform-box: fill-box; transform-origin: 50% 50%; animation: c3-blink 6.1s linear infinite; }
  .cloudy3-pupil { transform-box: fill-box; transform-origin: 50% 50%; animation: c3-look 6.1s ease-in-out infinite; }
  #cloudy3-smile { transform-box: fill-box; transform-origin: 50% 50%; animation: c3-smile 4.6s ease-in-out infinite; }
  @keyframes c3-float { 0%,100%{transform:translate3d(0,0,0) rotate(0deg)} 42%{transform:translate3d(0,-8px,0) rotate(.5deg)} 75%{transform:translate3d(-2px,3px,0) rotate(-.4deg)} }
  @keyframes c3-puff { 0%,100%{transform:scale(1)} 44%{transform:scale(1.01,.992)} 72%{transform:scale(.996,1.005)} }
  @keyframes c3-face { 0%,100%{transform:translate3d(0,0,0)} 42%{transform:translate3d(0,2px,0)} 75%{transform:translate3d(1px,-1px,0)} }
  @keyframes c3-blink { 0%,68%,74%,100%{transform:scaleY(1)} 70%,72%{transform:scaleY(.08)} }
  @keyframes c3-look { 0%,48%,100%{transform:translate3d(0,0,0)} 58%,66%{transform:translate3d(3px,1px,0)} 84%,90%{transform:translate3d(-2px,-1px,0)} }
  @keyframes c3-smile { 0%,100%{transform:translate3d(0,0,0) scale(1)} 46%{transform:translate3d(1px,-1px,0) scale(1.04,.97)} }
  @media (prefers-reduced-motion: reduce) {
    #cloudy3, #cloudy3-body, #cloudy3-face, .cloudy3-eye, .cloudy3-pupil, #cloudy3-smile { animation: none; }
  }
</style>
