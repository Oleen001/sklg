<g class="cloudy1-eye"><circle cx="45.1571" cy="45.1571" r="45.1571" transform="matrix(-1 0 0 1 399.589 168.797)" fill="white"/><g class="cloudy1-pupil"><circle cx="27.1969" cy="27.1969" r="27.1969" transform="matrix(-1 0 0 1 362.642 184.192)" fill="black"/></g></g>
