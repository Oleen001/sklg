<svg width="643" height="550" viewBox="0 0 643 550" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="cloudy1-title">
<title id="cloudy1-title">Cloudy 1 idle mascot</title>
<style>
  #cloudy1 { transform-box: view-box; transform-origin: 50% 55%; animation: c1-float 5.6s ease-in-out infinite; }
  #cloudy1-body { transform-box: fill-box; transform-origin: 50% 80%; animation: c1-puff 4.4s ease-in-out infinite; }
  #cloudy1-hand { transform-box: fill-box; transform-origin: 58% 24%; animation: c1-wave 3.8s ease-in-out infinite; }
  #cloudy1-face { transform-box: fill-box; transform-origin: 50% 50%; animation: c1-face 5.6s ease-in-out infinite; }
  .cloudy1-eye { transform-box: fill-box; transform-origin: 50% 50%; animation: c1-blink 5.9s linear infinite; }
  .cloudy1-pupil { transform-box: fill-box; transform-origin: 50% 50%; animation: c1-look 5.9s ease-in-out infinite; }
  #cloudy1-mouth { transform-box: fill-box; transform-origin: 50% 50%; animation: c1-mouth 4.4s ease-in-out infinite; }
  .cloudy1-breeze { stroke-dasharray: 36 18; animation: c1-breeze 2.8s ease-in-out infinite; }
  #cloudy1-breeze-2 { animation-delay: .35s; }
  @keyframes c1-float { 0%,100%{transform:translate3d(0,0,0) rotate(0deg)} 38%{transform:translate3d(0,-9px,0) rotate(-.6deg)} 72%{transform:translate3d(2px,3px,0) rotate(.4deg)} }
  @keyframes c1-puff { 0%,100%{transform:scale(1)} 48%{transform:scale(1.012,.99)} 72%{transform:scale(.996,1.006)} }
  @keyframes c1-wave { 0%,100%{transform:rotate(0deg) translate3d(0,0,0)} 45%{transform:rotate(-5deg) translate3d(-1px,-3px,0)} 70%{transform:rotate(3deg) translate3d(2px,1px,0)} }
  @keyframes c1-face { 0%,100%{transform:translate3d(0,0,0)} 38%{transform:translate3d(0,3px,0)} 72%{transform:translate3d(-1px,-1px,0)} }
  @keyframes c1-blink { 0%,70%,76%,100%{transform:scaleY(1)} 72%,74%{transform:scaleY(.08)} }
  @keyframes c1-look { 0%,45%,100%{transform:translate3d(0,0,0)} 54%,64%{transform:translate3d(3px,-1px,0)} 84%,90%{transform:translate3d(-2px,1px,0)} }
  @keyframes c1-mouth { 0%,100%{transform:translate3d(0,0,0) scale(1)} 48%{transform:translate3d(1px,-2px,0) scale(1.04,.96)} }
  @keyframes c1-breeze { 0%,100%{stroke-dashoffset:0; opacity:.72} 50%{stroke-dashoffset:-18; opacity:1} }
  @media (prefers-reduced-motion: reduce) {
    #cloudy1, #cloudy1-body, #cloudy1-hand, #cloudy1-face, .cloudy1-eye, .cloudy1-pupil, #cloudy1-mouth, .cloudy1-breeze { animation: none; }
  }
</style>
<g id="cloudy1">
