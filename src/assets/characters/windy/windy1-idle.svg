<svg width="600" height="476" viewBox="0 0 600 476" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="windy1-title">
<title id="windy1-title">Windy 1 idle mascot</title>
<style>
  #windy1 { transform-box: view-box; transform-origin: 52% 55%; animation: w1-float 5.2s ease-in-out infinite; }
  #windy1-body { transform-box: fill-box; transform-origin: 48% 62%; animation: w1-breathe 4.6s ease-in-out infinite; }
  #windy1-gust-top { transform-box: fill-box; transform-origin: 45% 55%; animation: w1-gust-top 5.8s ease-in-out infinite; }
  #windy1-gust-mid { transform-box: fill-box; transform-origin: 50% 55%; animation: w1-gust-mid 5.2s ease-in-out infinite; }
  #windy1-gust-low { transform-box: fill-box; transform-origin: 50% 55%; animation: w1-gust-low 4.7s ease-in-out infinite; }
  #windy1-hand { transform-box: fill-box; transform-origin: 70% 20%; animation: w1-hand 4s ease-in-out infinite; }
  #windy1-face { transform-box: fill-box; transform-origin: 50% 50%; animation: w1-face 5.2s ease-in-out infinite; }
  .windy1-eye { transform-box: fill-box; transform-origin: 50% 50%; animation: w1-blink 5.7s linear infinite; }
  .windy1-pupil { transform-box: fill-box; transform-origin: 50% 50%; animation: w1-look 5.7s ease-in-out infinite; }
  #windy1-smile { transform-box: fill-box; transform-origin: 50% 50%; animation: w1-smile 4.6s ease-in-out infinite; }
  @keyframes w1-float { 0%,100%{transform:translate3d(0,0,0) rotate(0deg)} 40%{transform:translate3d(0,-8px,0) rotate(-.7deg)} 72%{transform:translate3d(2px,3px,0) rotate(.5deg)} }
  @keyframes w1-breathe { 0%,100%{transform:scale(1)} 48%{transform:scale(1.012,.99)} }
  @keyframes w1-gust-top { 0%,100%{transform:translate3d(0,0,0) rotate(0deg)} 50%{transform:translate3d(8px,-4px,0) rotate(1.2deg)} }
  @keyframes w1-gust-mid { 0%,100%{transform:translate3d(0,0,0) rotate(0deg)} 52%{transform:translate3d(10px,-2px,0) rotate(.8deg)} }
  @keyframes w1-gust-low { 0%,100%{transform:translate3d(0,0,0)} 50%{transform:translate3d(7px,2px,0)} }
  @keyframes w1-hand { 0%,100%{transform:rotate(0deg)} 45%{transform:rotate(4deg) translate3d(3px,-2px,0)} 70%{transform:rotate(-3deg) translate3d(-2px,2px,0)} }
  @keyframes w1-face { 0%,100%{transform:translate3d(0,0,0)} 40%{transform:translate3d(0,2px,0)} 72%{transform:translate3d(-1px,-1px,0)} }
  @keyframes w1-blink { 0%,70%,76%,100%{transform:scaleY(1)} 72%,74%{transform:scaleY(.08)} }
  @keyframes w1-look { 0%,46%,100%{transform:translate3d(0,0,0)} 56%,64%{transform:translate3d(3px,-1px,0)} 84%,90%{transform:translate3d(-2px,1px,0)} }
  @keyframes w1-smile { 0%,100%{transform:translate3d(0,0,0) scale(1)} 48%{transform:translate3d(1px,-1px,0) scale(1.04,.97)} }
  @media (prefers-reduced-motion: reduce) {
    #windy1, #windy1-body, #windy1-gust-top, #windy1-gust-mid, #windy1-gust-low, #windy1-hand, #windy1-face, .windy1-eye, .windy1-pupil, #windy1-smile { animation: none; }
  }
</style>
