<svg width="507" height="486" viewBox="0 0 507 486" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="windy3-title">
<title id="windy3-title">Windy 3 idle mascot</title>
<style>
  #windy3-body { transform-box: fill-box; transform-origin: 50% 62%; animation: w3-float 5.4s ease-in-out infinite; }
  #windy3-gust-top { transform-box: fill-box; transform-origin: 42% 55%; animation: w3-gust-top 6.2s ease-in-out infinite; }
  #windy3-gust-mid { transform-box: fill-box; transform-origin: 48% 55%; animation: w3-gust-mid 5.6s ease-in-out infinite; }
  #windy3-gust-low { transform-box: fill-box; transform-origin: 52% 55%; animation: w3-gust-low 5s ease-in-out infinite; }
  .windy3-eye { transform-box: fill-box; transform-origin: 50% 50%; animation: w3-eye-rest 5.8s ease-in-out infinite; }
  .windy3-pupil { transform-box: fill-box; transform-origin: 50% 50%; animation: w3-look 5.8s ease-in-out infinite; }
  @keyframes w3-float { 0%,100%{transform:translate3d(0,0,0) rotate(0deg)} 42%{transform:translate3d(0,-8px,0) rotate(-.6deg)} 74%{transform:translate3d(2px,3px,0) rotate(.4deg)} }
  @keyframes w3-gust-top { 0%,100%{transform:translate3d(0,0,0) rotate(0deg)} 50%{transform:translate3d(8px,-5px,0) rotate(1.1deg)} }
  @keyframes w3-gust-mid { 0%,100%{transform:translate3d(0,0,0) rotate(0deg)} 52%{transform:translate3d(9px,-2px,0) rotate(.8deg)} }
  @keyframes w3-gust-low { 0%,100%{transform:translate3d(0,0,0)} 50%{transform:translate3d(7px,2px,0)} }
  @keyframes w3-eye-rest { 0%,100%{transform:translate3d(0,0,0) scaleY(1)} 50%{transform:translate3d(0,-1px,0) scaleY(.94)} }
  @keyframes w3-look { 0%,48%,100%{transform:translate3d(0,0,0)} 58%,66%{transform:translate3d(3px,-1px,0)} 84%,90%{transform:translate3d(-2px,1px,0)} }
  @media (prefers-reduced-motion: reduce) {
    #windy3-body, #windy3-gust-top, #windy3-gust-mid, #windy3-gust-low, .windy3-eye, .windy3-pupil { animation: none; }
  }
</style>
