<svg width="630" height="550" viewBox="0 0 630 550" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sunny1-title">
<title id="sunny1-title">Sunny 1 idle mascot</title>
<style>
  #sunny1 { transform-box: view-box; transform-origin: 50% 50%; animation: s1-float 5s ease-in-out infinite; }
  #sunny1-rays { transform-box: fill-box; transform-origin: 50% 50%; animation: s1-rays 7.2s ease-in-out infinite; }
  #sunny1-core { transform-box: fill-box; transform-origin: 50% 55%; animation: s1-core 4s ease-in-out infinite; }
  #sunny1-hand { transform-box: fill-box; transform-origin: 60% 20%; animation: s1-wave 3.2s ease-in-out infinite; }
  #sunny1-face { transform-box: fill-box; transform-origin: 50% 50%; animation: s1-face 5s ease-in-out infinite; }
  .sunny1-eye { transform-box: fill-box; transform-origin: 50% 50%; animation: s1-blink 5.5s linear infinite; }
  .sunny1-pupil { transform-box: fill-box; transform-origin: 50% 50%; animation: s1-look 5.5s ease-in-out infinite; }
  #sunny1-smile { transform-box: fill-box; transform-origin: 50% 50%; animation: s1-smile 4s ease-in-out infinite; }
  #sunny1-spark { stroke-dasharray: 32 14; animation: s1-spark 2.6s ease-in-out infinite; }
  @keyframes s1-float { 0%,100%{transform:translate3d(0,0,0)} 42%{transform:translate3d(0,-8px,0)} 74%{transform:translate3d(2px,3px,0)} }
  @keyframes s1-rays { 0%,100%{transform:rotate(0deg) scale(1)} 50%{transform:rotate(2deg) scale(1.018)} }
  @keyframes s1-core { 0%,100%{transform:scale(1)} 48%{transform:scale(1.018,.986)} }
  @keyframes s1-wave { 0%,100%{transform:rotate(0deg)} 45%{transform:rotate(-7deg) translate3d(-2px,-3px,0)} 72%{transform:rotate(4deg) translate3d(2px,1px,0)} }
  @keyframes s1-face { 0%,100%{transform:translate3d(0,0,0)} 42%{transform:translate3d(0,2px,0)} 74%{transform:translate3d(-1px,-1px,0)} }
  @keyframes s1-blink { 0%,69%,75%,100%{transform:scaleY(1)} 71%,73%{transform:scaleY(.08)} }
  @keyframes s1-look { 0%,46%,100%{transform:translate3d(0,0,0)} 55%,64%{transform:translate3d(2px,-1px,0)} 82%,88%{transform:translate3d(-2px,1px,0)} }
  @keyframes s1-smile { 0%,100%{transform:translate3d(0,0,0) scale(1)} 48%{transform:translate3d(1px,-2px,0) scale(1.05,.96)} }
  @keyframes s1-spark { 0%,100%{stroke-dashoffset:0; opacity:.75} 50%{stroke-dashoffset:-18; opacity:1} }
  @media (prefers-reduced-motion: reduce) {
    #sunny1, #sunny1-rays, #sunny1-core, #sunny1-hand, #sunny1-face, .sunny1-eye, .sunny1-pupil, #sunny1-smile, #sunny1-spark { animation: none; }
  }
</style>
