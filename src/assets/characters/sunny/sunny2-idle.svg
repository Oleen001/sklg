<svg width="630" height="550" viewBox="0 0 630 550" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sunny2-title">
<title id="sunny2-title">Sunny 2 idle mascot</title>
<style>
  #sunny2 { transform-box: view-box; transform-origin: 50% 52%; animation: s2-float 5.3s ease-in-out infinite; }
  #sunny2-rays { transform-box: fill-box; transform-origin: 50% 50%; animation: s2-rays 6.8s ease-in-out infinite; }
  #sunny2-core { transform-box: fill-box; transform-origin: 50% 55%; animation: s2-core 4.2s ease-in-out infinite; }
  #sunny2-face { transform-box: fill-box; transform-origin: 50% 50%; animation: s2-face 5.3s ease-in-out infinite; }
  .sunny2-eye { transform-box: fill-box; transform-origin: 50% 50%; animation: s2-blink 5.8s linear infinite; }
  .sunny2-pupil { transform-box: fill-box; transform-origin: 50% 50%; animation: s2-look 5.8s ease-in-out infinite; }
  #sunny2-mouth { transform-box: fill-box; transform-origin: 50% 50%; animation: s2-mouth 4.2s ease-in-out infinite; }
  @keyframes s2-float { 0%,100%{transform:translate3d(0,0,0) rotate(0deg)} 40%{transform:translate3d(0,-7px,0) rotate(-.5deg)} 76%{transform:translate3d(2px,3px,0) rotate(.5deg)} }
  @keyframes s2-rays { 0%,100%{transform:rotate(0deg) scale(1)} 50%{transform:rotate(-2deg) scale(1.02)} }
  @keyframes s2-core { 0%,100%{transform:scale(1)} 48%{transform:scale(1.016,.988)} }
  @keyframes s2-face { 0%,100%{transform:translate3d(0,0,0)} 40%{transform:translate3d(0,2px,0)} 76%{transform:translate3d(-1px,-1px,0)} }
  @keyframes s2-blink { 0%,70%,76%,100%{transform:scaleY(1)} 72%,74%{transform:scaleY(.08)} }
  @keyframes s2-look { 0%,45%,100%{transform:translate3d(0,0,0)} 54%,64%{transform:translate3d(3px,-1px,0)} 84%,90%{transform:translate3d(-2px,1px,0)} }
  @keyframes s2-mouth { 0%,100%{transform:translate3d(0,0,0) scale(1)} 48%{transform:translate3d(1px,-1px,0) scale(1.06,.95)} }
  @media (prefers-reduced-motion: reduce) {
    #sunny2, #sunny2-rays, #sunny2-core, #sunny2-face, .sunny2-eye, .sunny2-pupil, #sunny2-mouth { animation: none; }
  }
</style>
