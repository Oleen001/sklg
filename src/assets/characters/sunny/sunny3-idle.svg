<svg width="630" height="550" viewBox="0 0 630 550" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="sunny3-title">
<title id="sunny3-title">Sunny 3 idle mascot</title>
<style>
  #sunny3 { transform-box: view-box; transform-origin: 50% 50%; animation: s3-float 5.8s ease-in-out infinite; }
  #sunny3-rays { transform-box: fill-box; transform-origin: 50% 50%; animation: s3-rays 8s ease-in-out infinite; }
  #sunny3-core { transform-box: fill-box; transform-origin: 50% 55%; animation: s3-core 4.8s ease-in-out infinite; }
  #sunny3-face { transform-box: fill-box; transform-origin: 50% 50%; animation: s3-face 5.8s ease-in-out infinite; }
  .sunny3-eye { transform-box: fill-box; transform-origin: 50% 50%; animation: s3-eye-rest 4.8s ease-in-out infinite; }
  #sunny3-smile { transform-box: fill-box; transform-origin: 50% 50%; animation: s3-smile 4.8s ease-in-out infinite; }
  @keyframes s3-float { 0%,100%{transform:translate3d(0,0,0)} 45%{transform:translate3d(0,-6px,0)} 76%{transform:translate3d(-1px,3px,0)} }
  @keyframes s3-rays { 0%,100%{transform:rotate(0deg) scale(1)} 50%{transform:rotate(1.4deg) scale(1.014)} }
  @keyframes s3-core { 0%,100%{transform:scale(1)} 48%{transform:scale(1.01,.992)} }
  @keyframes s3-face { 0%,100%{transform:translate3d(0,0,0)} 45%{transform:translate3d(0,2px,0)} 76%{transform:translate3d(1px,-1px,0)} }
  @keyframes s3-eye-rest { 0%,100%{transform:translate3d(0,0,0) scaleY(1)} 50%{transform:translate3d(0,-1px,0) scaleY(.94)} }
  @keyframes s3-smile { 0%,100%{transform:translate3d(0,0,0) scale(1)} 48%{transform:translate3d(1px,-1px,0) scale(1.04,.97)} }
  @media (prefers-reduced-motion: reduce) {
    #sunny3, #sunny3-rays, #sunny3-core, #sunny3-face, .sunny3-eye, #sunny3-smile { animation: none; }
  }
</style>
